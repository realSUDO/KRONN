<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRONN — Uptime Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #fff;
    }

    header p {
      font-size: 0.85rem;
      color: #555;
      margin-top: 0.4rem;
    }

    #grid {
      display: grid;
      gap: 1rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .card .url {
      font-size: 0.9rem;
      color: #aaa;
      word-break: break-all;
    }

    .card .meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
    }

    .badge.up   { background: #0f2e1a; color: #4ade80; border: 1px solid #166534; }
    .badge.down { background: #2e0f0f; color: #f87171; border: 1px solid #991b1b; }

    .ms {
      font-size: 0.8rem;
      color: #555;
    }

    #empty {
      text-align: center;
      color: #444;
      margin-top: 4rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>KRONN</h1>
    <p id="last-checked">Checking...</p>
  </header>

  <div id="grid"></div>
  <p id="empty" hidden>No data yet. Waiting for first ping run.</p>

  <script src="script.js"></script>
</body>
</html>
