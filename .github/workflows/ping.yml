name: KRONN Ping

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping sites and write status
        run: |
          SITES=$(cat data/sites.json | tr -d '[]" ' | tr ',' '\n' | grep -v '^$')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RESULTS="["
          FIRST=true

          while IFS= read -r URL; do
            START=$(date +%s%3N)
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            END=$(date +%s%3N)
            MS=$((END - START))

            if [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" -ge 500 ]; then
              STATUS="DOWN"
            else
              STATUS="UP"
            fi

            [ "$FIRST" = true ] && FIRST=false || RESULTS="$RESULTS,"
            RESULTS="$RESULTS{\"url\":\"$URL\",\"status\":\"$STATUS\",\"httpStatus\":$HTTP_CODE,\"ms\":$MS,\"checkedAt\":\"$TIMESTAMP\"}"
          done <<< "$SITES"

          RESULTS="$RESULTS]"
          echo "$RESULTS" > logs/status.json
          echo "Results: $RESULTS"

      - name: Commit status
        run: |
          git config user.name "kronn-bot"
          git config user.email "kronn-bot@users.noreply.github.com"
          git add logs/status.json
          git diff --cached --quiet || git commit -m "chore: ping update $(date -u +%H:%M)"
          git push
